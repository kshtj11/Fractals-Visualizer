<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fractal Visualizer 3000 – p5.js</title>
  <meta name="description" content="Interactive fractal visualizer featuring Mandelbrot, Julia, Newton, Barnsley Fern, Koch Snowflake, Sierpinski Triangle and more – ported from Processing to p5.js." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; overscroll-behavior: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #F9F7F1; }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
  <!-- p5.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  
  <script src="Theme.js"></script>
  <script src="Camera.js"></script>
  <script src="Parameter.js"></script>
  <script src="ColorPalette.js"></script>
  <script src="PaletteManager.js"></script>
  <script src="Fractal.js"></script>
  
  <script src="Mandelbrot.js"></script>
  <script src="JuliaSet.js"></script>
  <script src="NewtonFractal.js"></script>
  <script src="BarnsleyFern.js"></script>
  <script src="KochSnowflake.js"></script>
  <script src="SierpinskiTriangle.js"></script>
  <script src="CantorSet.js"></script>
  
  <script src="ParameterPanel.js"></script>
  <script src="FractalSwitcher.js"></script>
  <script src="GradientEditor.js"></script>
  <script src="FormulaBar.js"></script>
  <script src="DimensionDisplay.js"></script>
  <script src="InfoOverlay.js"></script>
  
  <script src="sketch.js"></script>
</body>
</html>
